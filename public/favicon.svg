<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="100" height="100" rx="20" fill="url(#bgGradient)"/>
  
  <!-- Border -->
  <rect width="100" height="100" rx="20" fill="none" stroke="#334155" stroke-width="2"/>
  
  <!-- Code icon (</>) -->
  <g transform="translate(50, 50)" fill="url(#iconGradient)">
    <!-- Left bracket < -->
    <path d="M -18 -15 L -28 0 L -18 15" stroke="url(#iconGradient)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Forward slash / -->
    <path d="M -5 15 L 5 -15" stroke="url(#iconGradient)" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Right bracket > -->
    <path d="M 18 -15 L 28 0 L 18 15" stroke="url(#iconGradient)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
